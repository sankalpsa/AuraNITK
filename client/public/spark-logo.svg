<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" style="background:#0a0118">
  <defs>
    <radialGradient id="glowCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a0118" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ambient glow background -->
  <circle cx="200" cy="190" r="160" fill="url(#glowCore)"/>

  <!-- Orbit rings -->
  <circle cx="200" cy="190" r="120" fill="none" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
  <circle cx="200" cy="190" r="148" fill="none" stroke="rgba(236,72,153,0.15)" stroke-width="1"/>

  <!-- Spark particle dots on ring -->
  <circle cx="200" cy="70" r="3.5" fill="#ec4899" filter="url(#glow)"/>
  <circle cx="320" cy="150" r="2.5" fill="#8b5cf6" filter="url(#glow)"/>
  <circle cx="310" cy="280" r="3" fill="#06b6d4" filter="url(#glow)"/>
  <circle cx="85" cy="260" r="2.5" fill="#ec4899" filter="url(#glow)"/>
  <circle cx="78" cy="140" r="3" fill="#8b5cf6" filter="url(#glow)"/>

  <!-- Big stylised S -->
  <text
    x="200" y="230"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="170"
    font-weight="900"
    letter-spacing="-6"
    fill="url(#letterGrad)"
    filter="url(#glow)"
  >S</text>

  <!-- SPARK wordmark -->
  <text
    x="200" y="300"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="38"
    font-weight="900"
    letter-spacing="16"
    fill="url(#textGrad)"
  >SPARK</text>

  <!-- Tagline -->
  <text
    x="200" y="328"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11"
    letter-spacing="4"
    fill="rgba(255,255,255,0.28)"
  >CAMPUS CONNECTIONS</text>
</svg>
